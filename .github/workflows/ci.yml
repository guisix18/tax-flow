name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck + Tests
    runs-on: ubuntu-latest

    env:
      # Prisma client's lib/prisma.ts does process.exit(1) when DATABASE_URL
      # is absent, even though tests mock the prisma module. A dummy URL
      # keeps that guard quiet in CI (tests never open a real connection).
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Tests
        run: npm test
